name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  cli:
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build CLI binaries
        run: |
          cd cli
          mkdir -p dist
          for os in darwin linux; do
            for arch in arm64 amd64; do
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build \
                -ldflags "-s -w -X github.com/dunkinfrunkin/maestro/cli/cmd/maestro/cmd.Version=${{ github.ref_name }}" \
                -o dist/maestro_${os}_${arch}/maestro ./cmd/maestro
              tar czf dist/maestro_${os}_${arch}.tar.gz -C dist/maestro_${os}_${arch} maestro
            done
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            cli/dist/maestro_darwin_arm64.tar.gz \
            cli/dist/maestro_darwin_amd64.tar.gz \
            cli/dist/maestro_linux_arm64.tar.gz \
            cli/dist/maestro_linux_amd64.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          SHA_DARWIN_ARM64=$(shasum -a 256 cli/dist/maestro_darwin_arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_AMD64=$(shasum -a 256 cli/dist/maestro_darwin_amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 cli/dist/maestro_linux_arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(shasum -a 256 cli/dist/maestro_linux_amd64.tar.gz | awk '{print $1}')

          FORMULA=$(cat <<'RUBY'
          class Maestro < Formula
            desc "Autonomous coding agent orchestration for engineering teams"
            homepage "https://github.com/dunkinfrunkin/maestro"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/dunkinfrunkin/maestro/releases/download/v#{version}/maestro_darwin_arm64.tar.gz"
              end
              on_intel do
                url "https://github.com/dunkinfrunkin/maestro/releases/download/v#{version}/maestro_darwin_amd64.tar.gz"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/dunkinfrunkin/maestro/releases/download/v#{version}/maestro_linux_arm64.tar.gz"
              end
              on_intel do
                url "https://github.com/dunkinfrunkin/maestro/releases/download/v#{version}/maestro_linux_amd64.tar.gz"
              end
            end

            def install
              bin.install "maestro"
            end

            test do
              assert_match "maestro", shell_output("#{bin}/maestro --help")
            end
          end
          RUBY
          )

          # Strip leading indentation
          FORMULA=$(echo "$FORMULA" | sed 's/^          //')

          # Inject version and SHAs
          FORMULA=$(echo "$FORMULA" | sed "s/license \"MIT\"/version \"${VERSION_NUM}\"\n  license \"MIT\"/")
          FORMULA=$(echo "$FORMULA" | sed "s|maestro_darwin_arm64.tar.gz\"|maestro_darwin_arm64.tar.gz\"\n        sha256 \"${SHA_DARWIN_ARM64}\"|")
          FORMULA=$(echo "$FORMULA" | sed "s|maestro_darwin_amd64.tar.gz\"|maestro_darwin_amd64.tar.gz\"\n        sha256 \"${SHA_DARWIN_AMD64}\"|")
          FORMULA=$(echo "$FORMULA" | sed "s|maestro_linux_arm64.tar.gz\"|maestro_linux_arm64.tar.gz\"\n        sha256 \"${SHA_LINUX_ARM64}\"|")
          FORMULA=$(echo "$FORMULA" | sed "s|maestro_linux_amd64.tar.gz\"|maestro_linux_amd64.tar.gz\"\n        sha256 \"${SHA_LINUX_AMD64}\"|")

          # Get current file SHA
          FILE_SHA=$(gh api repos/dunkinfrunkin/homebrew-tap/contents/Formula/maestro.rb --jq '.sha')

          # Update via GitHub API (no git clone needed)
          echo "$FORMULA" | gh api repos/dunkinfrunkin/homebrew-tap/contents/Formula/maestro.rb \
            -X PUT \
            -f message="Update maestro to ${VERSION_NUM}" \
            -f content="$(echo "$FORMULA" | base64)" \
            -f sha="$FILE_SHA"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/dunkinfrunkin/maestro:${{ github.ref_name }}
            ghcr.io/dunkinfrunkin/maestro:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

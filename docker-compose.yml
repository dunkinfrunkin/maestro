services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maestro}
      POSTGRES_USER: ${POSTGRES_USER:-maestro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maestro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maestro}"]
      interval: 5s
      timeout: 5s
      retries: 5

